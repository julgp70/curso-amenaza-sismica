name: Publicar sitio estático en GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  prepare:
    name: Validar y preparar sitio
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Validar archivos públicos
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "index.html"
            "aviso-legal.html"
            "privacidad-y-cookies.html"
            "propiedad-intelectual-y-licencias.html"
            "css/styles.css"
            "js/script.js"
            "icons/favicon.svg"
            "images/ruta-aprendizaje-aprobada.png"
            "images/tarjeta-social-curso-20260717.png"
          )

          for file in "${required[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "ERROR: falta el archivo público $file"
              exit 1
            fi
          done

          if [[ -d "dist" || -f "build.py" || -d "data" || -d "templates" || -d "static" ]]; then
            echo "ERROR: el repositorio público contiene elementos del repositorio de desarrollo."
            exit 1
          fi

          grep -Fq "https://julgp70.github.io/curso-amenaza-sismica/" index.html
          echo "VALIDACIÓN ESTÁTICA: OK"

      - name: Preparar artefacto público
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html aviso-legal.html privacidad-y-cookies.html propiedad-intelectual-y-licencias.html _site/
          cp -R css icons images js _site/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto de GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    name: Publicar sitio
    runs-on: ubuntu-latest
    needs: prepare

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
